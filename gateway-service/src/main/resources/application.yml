server:
  port: 8080


spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**


        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/wallet/**


        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/payment/**


logging:
  level:
    org.springframework.cloud.gateway: DEBUG